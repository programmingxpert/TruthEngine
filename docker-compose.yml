services:
  searxng:
    image: searxng/searxng:latest
    ports:
      - "8888:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: truthengine
      POSTGRES_PASSWORD: truthengine
      POSTGRES_DB: truthengine
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truthengine -d truthengine"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && uvicorn truthengine.main:app --host 0.0.0.0 --port 8000",
      ]
    depends_on:
      db:
        condition: service_healthy
      searxng:
        condition: service_healthy
    environment:
      TRUTHENGINE_ENVIRONMENT: local
      TRUTHENGINE_SERVICE_NAME: truthengine-api
      TRUTHENGINE_APP_VERSION: 0.1.0
      TRUTHENGINE_LOG_LEVEL: INFO
      TRUTHENGINE_LOG_JSON: "true"
      TRUTHENGINE_REQUEST_ID_HEADER: X-Request-ID
      TRUTHENGINE_DATABASE_URL: postgresql+psycopg://truthengine:truthengine@db:5432/truthengine
      TRUTHENGINE_SEARXNG_URL: http://searxng:8080
      TRUTHENGINE_SEARXNG_MAX_RESULTS: 6
      TRUTHENGINE_DEEPSEEK_API_KEY: ${TRUTHENGINE_DEEPSEEK_API_KEY:-}
      TRUTHENGINE_DEEPSEEK_MODEL: ${TRUTHENGINE_DEEPSEEK_MODEL:-deepseek-chat}
      TRUTHENGINE_DEEPSEEK_BASE_URL: ${TRUTHENGINE_DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      TRUTHENGINE_CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:5173"

volumes:
  postgres-data:
